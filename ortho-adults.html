<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Airway Clinic – Orthodontic Adults</title>
  <style>
    :root {
      --bg: #f3f2f3;
      --ink: #31305f;
      --text: #4b4b63;
      --muted: #6f6f7a;
      --gold: #b99645;
      --gold-hover: #d4b055;
      --line: #6c6e88;
      --box: #d9d9de;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #e9e9ec;
      font-family: Arial, sans-serif;
      color: var(--text);
      padding: 24px 16px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .picker {
      max-width: 500px;
      width: 100%;
      background: var(--bg);
      border: 2px solid var(--line);
      padding: 40px 34px;
      text-align: center;
    }
    .logo-img { height: 60px; margin-bottom: 20px; }
    h1 {
      color: var(--ink);
      font-size: 28px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-family: "Arial Narrow", Arial, sans-serif;
    }
    .subtitle { color: var(--muted); font-size: 15px; margin-bottom: 32px; }
    .lang-links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .lang-btn {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      text-decoration: none; padding: 20px 32px; border: 2px solid var(--box);
      border-radius: 8px; background: #fff; transition: all 0.2s; min-width: 160px;
    }
    .lang-btn:hover { border-color: var(--gold); background: #faf6ef; transform: translateY(-2px); }
    .lang-btn .flag { font-size: 36px; }
    .lang-btn .label { font-size: 16px; font-weight: 700; color: var(--ink); }
    .lang-btn .desc { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="picker">
    <img class="logo-img" src="https://images.leadconnectorhq.com/image/f_webp/q_80/r_1200/u_https://assets.cdn.filesafe.space/Z9UtrrCvJc8ObhTIILLF/media/697504ceeb392b3e880ee4d4.png" alt="Airway Clinic logo">
    <h1>Orthodontics – Adults</h1>
    <p class="subtitle">Choose your language / Välj språk</p>
    <div class="lang-links">
      <a href="ortho-adults-sv.html" class="lang-btn">
        <span class="flag">🇸🇪</span>
        <span class="label">Svenska</span>
        <span class="desc">Ortodonti – Vuxna</span>
      </a>
      <a href="ortho-adults-en.html" class="lang-btn">
        <span class="flag">🇬🇧</span>
        <span class="label">English</span>
        <span class="desc">Orthodontics – Adults</span>
      </a>
    </div>
  </div>
</body>
</html>
